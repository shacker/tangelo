{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ block.super }} - Add Image{% endblock title %}

{% block content %}

  <h1>Add Image</h1>

  {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Add</button>
  </form>

{% endblock content %}
